<!DOCTYPE html>
<html>
<head>
<style>
.loader {
  border: 8px solid #f3f3f3;
  border-top: 8px solid #3498db;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  animation: spin 1s linear infinite;
  margin: 10px auto;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

#spinner {
  text-align: center;
  font-family: Arial, sans-serif;
  margin-top: 20px;
}
</style>

</head>
<body>
<div id="spinner" style="display:none;">
  <div class="loader"></div>
  <p>Scanning… please wait</p>
</div>

<input type="file" id="fileInput">
<div id="results"></div>
<script>
document.getElementById("fileInput").addEventListener("change", async (event) => {
    const file = event.target.files[0];
    if (!file) return;

    const resultsDiv = document.getElementById("results");
    const spinner = document.getElementById("spinner");

    // Show spinner
    spinner.style.display = "block";
    resultsDiv.innerHTML = "";

    const formData = new FormData();
    formData.append("file", file);

    try {
        // 1. Upload file
        const uploadRes = await fetch("https://www.virustotal.com/api/v3/files", {
            method: "POST",
            headers: {
                "x-apikey": "af1b467f459efc6f4c621f11bf19a8d182d6ddb4bbf1d2089051e209f7c70d7f"
            },
            body: formData
        });

        const uploadData = await uploadRes.json();
        const analysisId = uploadData.data.id;

        // 2. Get scan results
        const reportRes = await fetch(
            `https://www.virustotal.com/api/v3/analyses/${analysisId}`,
            {
                headers: { "x-apikey": "af1b467f459efc6f4c621f11bf19a8d182d6ddb4bbf1d2089051e209f7c70d7f" }
            }
        );

        const reportData = await reportRes.json();
        const stats = reportData.data.attributes.stats;

        // Hide spinner
        spinner.style.display = "none";

        // 3. Display results
        resultsDiv.innerHTML = `
            <h3>Scan Results</h3>
            <p><strong>Malicious:</strong> ${stats.malicious}</p>
            <p><strong>Suspicious:</strong> ${stats.suspicious}</p>
            <p><strong>Harmless:</strong> ${stats.harmless}</p>
            <p><strong>Undetected:</strong> ${stats.undetected}</p>
        `;

    } catch (err) {
        console.error("Error:", err);
        spinner.style.display = "none";
        resultsDiv.innerHTML = "<p style='color:red;'>Error scanning file.</p>";
    }
});
</script>

   
            
</body>
</html>
