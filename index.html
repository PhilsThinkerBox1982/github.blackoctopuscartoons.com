<input type="file" id="fileInput">
<div id="results"></div>
<script>
document.getElementById("fileInput").addEventListener("change", async (event) => {
    const file = event.target.files[0];
    if (!file) return;

    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "<p>Uploading file…</p>";

    const formData = new FormData();
    formData.append("file", file);

    try {
        // 1. Upload file
        const uploadRes = await fetch("https://www.virustotal.com/api/v3/files", {
            method: "POST",
            headers: {
                "x-apikey": "af1b467f459efc6f4c621f11bf19a8d182d6ddb4bbf1d2089051e209f7c70d7f"
            },
            body: formData
        });

        const uploadData = await uploadRes.json();
        const analysisId = uploadData.data.id;

        resultsDiv.innerHTML = "<p>File uploaded. Scanning…</p>";

        // 2. Get scan results
        const reportRes = await fetch(
            `https://www.virustotal.com/api/v3/analyses/${analysisId}`,
            {
                headers: { "x-apikey": "af1b467f459efc6f4c621f11bf19a8d182d6ddb4bbf1d2089051e209f7c70d7f" }
            }
        );

        const reportData = await reportRes.json();

        const stats = reportData.data.attributes.stats;

        // 3. Display results
        resultsDiv.innerHTML = `
            <h3>Scan Results</h3>
            <p><strong>Malicious:</strong> ${stats.malicious}</p>
            <p><strong>Suspicious:</strong> ${stats.suspicious}</p>
            <p><strong>Harmless:</strong> ${stats.harmless}</p>
            <p><strong>Undetected:</strong> ${stats.undetected}</p>
        `;

    } catch (err) {
        console.error("Error:", err);
        resultsDiv.innerHTML = "<p style='color:red;'>Error scanning file.</p>";
    }
});
</script>
